<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения — Smska</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #0b141a; color: #e9edef; 
      display: flex; align-items: center; justify-content: center; 
      height: 100vh; margin: 0; text-align: center; padding: 20px;
    }
    .card { 
      background: #1a2730; padding: 30px; border-radius: 20px; 
      max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    p { color: #8696a0; font-size: 14px; margin: 0 0 20px; }
    .btn {
      background: #25D366; color: white; border: none; 
      padding: 12px 24px; border-radius: 12px; 
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет соединения</h1>
    <p>Проверьте интернет и попробуйте снова. Сообщения отправятся автоматически, когда сеть появится.</p>
    <button class="btn" onclick="location.reload()">🔄 Повторить</button>
  </div>
</body>
</html>
